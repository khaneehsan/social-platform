<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageForge 2026 | حرفه‌ای</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --text-primary: #f0f4ff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255,255,255,0.03);
            --glass-border: rgba(255,255,255,0.06);
            --shadow: rgba(0,0,0,0.5);
            --accent-1: #00d4ff;
            --accent-2: #7c3aed;
            --accent-3: #06f7a3;
            --accent-gradient: linear-gradient(135deg, #00d4ff, #7c3aed, #06f7a3);
            --radius: 18px;
            --transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        [data-theme="light"] {
            --bg-primary: #f0f4fc;
            --bg-secondary: #e8edf5;
            --text-primary: #0b1a33;
            --text-secondary: #4d6b92;
            --glass-bg: rgba(255,255,255,0.6);
            --glass-border: rgba(0,0,0,0.08);
            --shadow: rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            padding: 16px;
            color: var(--text-primary);
            transition: var(--transition);
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 50%);
        }

        [data-theme="light"] body {
            background-image: 
                radial-gradient(ellipse at 10% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(124, 58, 237, 0.06) 0%, transparent 50%);
        }

        .container {
            max-width: 1440px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 20px 20px 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius) var(--radius) 0 0;
            transition: var(--transition);
            box-shadow: 0 4px 30px var(--shadow);
        }

        .header .logo {
            display: inline-block;
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .logo span {
            font-weight: 300;
            -webkit-text-fill-color: var(--text-secondary);
        }

        .header .subtitle {
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .header .year-badge {
            display: inline-block;
            background: var(--accent-gradient);
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.7rem;
            color: white;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .theme-toggle-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 10px;
            gap: 12px;
        }

        .theme-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 3px 5px;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            width: 90px;
        }

        .theme-toggle:hover {
            border-color: var(--accent-1);
        }

        .theme-toggle .toggle-track {
            position: relative;
            width: 100%;
            height: 24px;
            border-radius: 60px;
            background: var(--bg-secondary);
            transition: var(--transition);
        }

        .theme-toggle .toggle-thumb {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent-gradient);
            transition: var(--transition);
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        [data-theme="light"] .theme-toggle .toggle-thumb {
            left: calc(100% - 22px);
        }

        .theme-toggle .toggle-label {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.5rem;
            font-weight: 600;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .theme-toggle .toggle-label.light-label {
            left: 8px;
        }

        .theme-toggle .toggle-label.dark-label {
            right: 8px;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 4px;
            margin: 8px 0 2px;
        }

        .badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .badge:hover {
            border-color: var(--accent-1);
            color: var(--text-primary);
        }

        .badge.green { border-color: var(--accent-3); color: var(--accent-3); }
        .badge.upscale { border-color: var(--accent-1); color: var(--accent-1); }

        /* ===== طراحی جدید: راست/چپ ===== */
        .upload-section {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 0 0 var(--radius) var(--radius);
            padding: 16px 20px 20px;
            margin-bottom: 20px;
            transition: var(--transition);
            box-shadow: 0 4px 30px var(--shadow);
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        /* ===== سمت راست: کادر آپلود مربعی ===== */
        .upload-area {
            background: var(--glass-bg);
            border: 2px dashed var(--glass-border);
            border-radius: var(--radius);
            padding: 30px 16px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            order: 2;
        }

        .upload-area:hover {
            border-color: var(--accent-1);
            background: rgba(0, 212, 255, 0.05);
            transform: scale(1.02);
        }

        .upload-area .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 6px;
        }

        .upload-area h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 3px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .upload-area p {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* ===== سمت چپ: تنظیمات ===== */
        .settings-wrapper {
            order: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .settings-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            padding: 12px 14px;
            background: var(--glass-bg);
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            transition: var(--transition);
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .setting-item label {
            font-weight: 600;
            font-size: 0.65rem;
            color: var(--text-secondary);
        }

        .setting-item input,
        .setting-item select {
            padding: 5px 8px;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            background: var(--bg-secondary);
            color: var(--text-primary);
            transition: var(--transition);
            width: 100%;
            outline: none;
        }

        .setting-item input:focus,
        .setting-item select:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        .setting-item select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        [data-theme="light"] .setting-item input,
        [data-theme="light"] .setting-item select {
            background: white;
            color: var(--text-primary);
        }

        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            background: var(--glass-bg);
            padding: 8px 14px;
            border-radius: 60px;
            border: 1px solid var(--glass-border);
            gap: 4px;
            transition: var(--transition);
        }

        .stats-bar .stat {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .stats-bar .stat span {
            background: var(--bg-primary);
            padding: 1px 10px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            font-weight: 700;
            color: var(--text-primary);
            transition: var(--transition);
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
        }

        .btn {
            border: none;
            padding: 6px 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.7rem;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
        }

        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            color: white;
            box-shadow: 0 8px 30px rgba(0, 212, 255, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: linear-gradient(135deg, #06f7a3, #00d4ff);
            border: none;
            color: #0a0e1a;
        }

        .btn-success:hover {
            transform: translateY(-2px);
        }

        .btn-success:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-outline:hover {
            border-color: var(--accent-1);
            background: rgba(0, 212, 255, 0.05);
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: var(--glass-bg);
            border-radius: 10px;
            overflow: hidden;
            margin: 4px 0;
        }

        .progress-bar .progress-fill {
            height: 100%;
            background: var(--accent-gradient);
            transition: width 0.5s ease;
            width: 0%;
            border-radius: 10px;
        }

        .status-msg {
            text-align: center;
            font-weight: 500;
            padding: 8px 12px;
            background: var(--glass-bg);
            border-radius: 60px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            font-size: 0.75rem;
            transition: var(--transition);
        }

        .status-msg.success { border-color: var(--accent-3); color: var(--accent-3); }
        .status-msg.warning { border-color: #f59e0b; color: #f59e0b; }
        .status-msg.error { border-color: #ef4444; color: #ef4444; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px;
            margin: 14px 0 10px;
        }

        .image-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 8px;
            transition: var(--transition);
        }

        .image-card:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 212, 255, 0.2);
            box-shadow: 0 20px 60px var(--shadow);
        }

        .image-card .img-wrap {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
        }

        .image-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .image-card .card-footer {
            margin-top: 6px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 3px;
        }

        .image-card .file-name {
            font-size: 0.6rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
            color: var(--text-secondary);
        }

        .image-card .file-size {
            font-size: 0.55rem;
            background: var(--glass-bg);
            padding: 1px 8px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }

        .image-card .status-badge {
            font-size: 0.5rem;
            padding: 1px 8px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
        }

        .image-card .status-badge.done { border-color: var(--accent-3); color: var(--accent-3); }
        .image-card .status-badge.processing { border-color: #f59e0b; color: #f59e0b; }
        .image-card .status-badge.error { border-color: #ef4444; color: #ef4444; }
        .image-card .status-badge.upscaled { border-color: var(--accent-1); color: var(--accent-1); }

        .image-card .btn-group {
            display: flex;
            gap: 3px;
            margin-top: 4px;
            flex-wrap: wrap;
        }

        .image-card .btn-group .btn-sm {
            padding: 2px 8px;
            font-size: 0.55rem;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
            background: var(--glass-bg);
            color: var(--text-secondary);
        }

        .image-card .btn-group .btn-sm:hover {
            border-color: var(--accent-1);
            color: var(--text-primary);
        }

        .image-card .btn-group .btn-sm.download {
            border-color: var(--accent-1);
            color: var(--accent-1);
        }

        .image-card .btn-group .btn-sm.download:hover {
            background: var(--accent-1);
            color: var(--bg-primary);
        }

        .image-card .btn-group .btn-sm.upscale-btn {
            border-color: var(--accent-2);
            color: var(--accent-2);
        }

        .image-card .btn-group .btn-sm.upscale-btn:hover {
            background: var(--accent-2);
            color: white;
        }

        .image-card .btn-group .btn-sm.remove {
            border-color: #ef4444;
            color: #ef4444;
        }

        .image-card .btn-group .btn-sm.remove:hover {
            background: #ef4444;
            color: white;
        }

        .seo-footer {
            text-align: center;
            margin-top: 24px;
            padding: 16px;
            color: var(--text-secondary);
            font-size: 0.7rem;
            border-top: 1px solid var(--glass-border);
            opacity: 0.6;
            transition: var(--transition);
        }

        .seo-footer .heart {
            color: #ef4444;
        }

        /* ===== واکنش‌گرا ===== */
        @media (max-width: 900px) {
            .upload-section {
                grid-template-columns: 1fr;
            }
            .upload-area {
                aspect-ratio: auto;
                padding: 24px 16px;
                order: 1;
            }
            .settings-wrapper {
                order: 2;
            }
            .settings-panel {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            .settings-panel {
                grid-template-columns: 1fr;
            }
            .header .logo { font-size: 1.8rem; }
            .gallery-grid { grid-template-columns: 1fr; }
            .stats-bar { flex-direction: column; align-items: stretch; gap: 3px; }
            .action-bar .btn { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">ImageForge <span>2026</span></div>
        <div class="subtitle">✨ حرفه‌ای‌ترین ابزار بهینه‌سازی عکس</div>
        <div class="year-badge">⚡ نسخه نهایی</div>

        <div class="theme-toggle-wrapper">
            <div class="theme-toggle" id="themeToggle" role="button" tabindex="0">
                <div class="toggle-track">
                    <div class="toggle-thumb" id="toggleThumb">🌙</div>
                    <span class="toggle-label light-label">☀️</span>
                    <span class="toggle-label dark-label">🌙</span>
                </div>
            </div>
        </div>

        <div class="badge-group">
            <span class="badge green">🟢 کاهش حجم</span>
            <span class="badge upscale">🔍 افزایش کیفیت</span>
            <span class="badge">📁 هر تعداد</span>
            <span class="badge">🎨 فیلترها</span>
            <span class="badge">🌓 روز/شب</span>
        </div>
    </div>

    <!-- ===== بخش اصلی با طراحی راست/چپ ===== -->
    <div class="upload-section">
        <!-- سمت راست: کادر آپلود مربعی -->
        <div class="upload-area" id="uploadArea">
            <span class="icon">🚀</span>
            <h3>آپلود عکس</h3>
            <p>بکشید یا کلیک کنید</p>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>

        <!-- سمت چپ: تنظیمات -->
        <div class="settings-wrapper">
            <div class="settings-panel">
                <div class="setting-item">
                    <label>🎯 حجم هدف (KB)</label>
                    <input type="number" id="targetSizeKB" value="150" min="10" max="5000">
                </div>
                <div class="setting-item">
                    <label>📐 سایز خروجی (px)</label>
                    <input type="number" id="targetDimension" value="800" min="100" max="4000">
                </div>
                <div class="setting-item">
                    <label>📐 نسبت برش</label>
                    <select id="cropMode">
                        <option value="1:1">۱:۱ (مربع)</option>
                        <option value="4:3">۴:۳</option>
                        <option value="16:9">۱۶:۹</option>
                        <option value="3:2">۳:۲</option>
                        <option value="original" selected>اصلی</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>📁 فرمت خروجی</label>
                    <select id="outputFormat">
                        <option value="image/jpeg">JPEG</option>
                        <option value="image/png">PNG</option>
                        <option value="image/webp">WebP</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>🎨 فیلتر</label>
                    <select id="filterMode">
                        <option value="none">بدون فیلتر</option>
                        <option value="sharpen">🔪 شارپنس</option>
                        <option value="bw">⚫ سیاه‌سفید</option>
                        <option value="vintage">🟫 وینتیج</option>
                        <option value="bright">☀️ روشن‌تر</option>
                        <option value="contrast">🎯 کنتراست</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>🔍 افزایش کیفیت</label>
                    <select id="upscaleMode">
                        <option value="none">بدون افزایش</option>
                        <option value="simple">⬆️ ۲x (ساده)</option>
                        <option value="enhanced">⬆️ ۲x (پیشرفته)</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>📛 الگوی نام</label>
                    <input type="text" id="namePattern" value="image_{index}" placeholder="image_{index}">
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat">📸 <span id="totalCount">۰</span></div>
                <div class="stat">📦 <span id="totalSize">۰</span></div>
                <div class="stat">✅ <span id="processedCount">۰</span></div>
                <div class="stat">📊 <span id="reductionPercent">۰%</span></div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="action-bar">
                <button class="btn btn-primary" id="processAllBtn" disabled>🚀 پردازش</button>
                <button class="btn btn-success" id="downloadAllBtn" disabled>⬇️ ZIP</button>
                <button class="btn btn-outline" id="clearBtn">🗑️</button>
                <button class="btn btn-outline" onclick="saveSettings()">💾 ذخیره</button>
                <button class="btn btn-outline" onclick="loadSettings()">📂 بارگذاری</button>
            </div>

            <div class="status-msg" id="statusMessage">🚀 آماده است!</div>
        </div>
    </div>

    <div class="gallery-grid" id="galleryGrid"></div>

    <div class="seo-footer">
        <p><strong>ImageForge 2026</strong> — حرفه‌ای‌ترین ابزار <span class="heart">❤️</span></p>
    </div>
</div>

<script>
    (function() {
        // ===== Theme =====
        const themeToggle = document.getElementById('themeToggle');
        const toggleThumb = document.getElementById('toggleThumb');

        function setTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            toggleThumb.textContent = theme === 'dark' ? '🌙' : '☀️';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'dark';
            setTheme(current === 'dark' ? 'light' : 'dark');
        }

        themeToggle.addEventListener('click', toggleTheme);
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);

        // ===== DOM Elements =====
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const galleryGrid = document.getElementById('galleryGrid');
        const totalCount = document.getElementById('totalCount');
        const totalSize = document.getElementById('totalSize');
        const processedCount = document.getElementById('processedCount');
        const reductionPercent = document.getElementById('reductionPercent');
        const statusMessage = document.getElementById('statusMessage');
        const processAllBtn = document.getElementById('processAllBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressFill = document.getElementById('progressFill');

        const targetSizeKB = document.getElementById('targetSizeKB');
        const targetDimension = document.getElementById('targetDimension');
        const cropMode = document.getElementById('cropMode');
        const outputFormat = document.getElementById('outputFormat');
        const filterMode = document.getElementById('filterMode');
        const upscaleMode = document.getElementById('upscaleMode');
        const namePattern = document.getElementById('namePattern');

        let filesList = [];
        let idCounter = 0;
        let isProcessing = false;

        // ===== Helpers =====
        function formatBytes(bytes) {
            if (bytes === 0) return '0 B';
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(2) + ' MB';
        }

        function getAspectRatio(mode) {
            if (mode === '1:1') return 1;
            if (mode === '4:3') return 4/3;
            if (mode === '16:9') return 16/9;
            if (mode === '3:2') return 3/2;
            return null;
        }

        function applyFilter(ctx, w, h, filter, imageData) {
            if (filter === 'none' || !imageData) return;
            const data = imageData.data;
            const len = data.length;
            
            if (filter === 'bw') {
                for (let i = 0; i < len; i += 4) {
                    const g = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                    data[i] = data[i+1] = data[i+2] = g;
                }
            } else if (filter === 'vintage') {
                for (let i = 0; i < len; i += 4) {
                    data[i] = Math.min(255, data[i] * 1.1 + 20);
                    data[i+1] = Math.min(255, data[i+1] * 0.9 + 10);
                    data[i+2] = Math.min(255, data[i+2] * 0.8);
                }
            } else if (filter === 'bright') {
                for (let i = 0; i < len; i += 4) {
                    data[i] = Math.min(255, data[i] * 1.2);
                    data[i+1] = Math.min(255, data[i+1] * 1.2);
                    data[i+2] = Math.min(255, data[i+2] * 1.2);
                }
            } else if (filter === 'contrast') {
                const f = 1.5;
                for (let i = 0; i < len; i += 4) {
                    data[i] = Math.min(255, Math.max(0, (data[i] - 128) * f + 128));
                    data[i+1] = Math.min(255, Math.max(0, (data[i+1] - 128) * f + 128));
                    data[i+2] = Math.min(255, Math.max(0, (data[i+2] - 128) * f + 128));
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        function applySharpen(ctx, w, h) {
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const copy = new Uint8ClampedArray(data);
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const idx = (y * w + x) * 4;
                    const kernel = [[0,-1,0],[-1,5,-1],[0,-1,0]];
                    for (let c = 0; c < 3; c++) {
                        let sum = 0;
                        for (let ky = -1; ky <= 1; ky++) {
                            for (let kx = -1; kx <= 1; kx++) {
                                const nIdx = ((y + ky) * w + (x + kx)) * 4 + c;
                                sum += copy[nIdx] * kernel[ky+1][kx+1];
                            }
                        }
                        data[idx + c] = Math.min(255, Math.max(0, sum));
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        async function downloadWithLocation(blob, filename) {
            try {
                const dirHandle = await window.showDirectoryPicker();
                const fileHandle = await dirHandle.getFileHandle(filename, { create: true });
                const writable = await fileHandle.createWritable();
                await writable.write(blob);
                await writable.close();
                updateStatusMessage(`✅ ذخیره شد در: ${dirHandle.name}/${filename}`, 'success');
            } catch (err) {
                if (err.name !== 'AbortError' && err.name !== 'SecurityError') {
                    fallbackDownload(blob, filename);
                } else {
                    updateStatusMessage('❌ انتخاب پوشه لغو شد.', 'warning');
                }
            }
        }

        function fallbackDownload(blob, filename) {
            const link = document.createElement('a');
            link.download = filename;
            link.href = URL.createObjectURL(blob);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(link.href), 5000);
            updateStatusMessage(`⬇️ دانلود ${filename} شروع شد.`, 'success');
        }

        // ===== Core Processing =====
        function processSingleItem(item) {
            return new Promise((resolve) => {
                if (!item.originalData) {
                    item.status = 'error';
                    resolve();
                    return;
                }

                item.status = 'processing';
                renderGallery();

                const img = item.originalData.img;
                const targetDim = parseInt(targetDimension.value) || 800;
                const targetSize = parseInt(targetSizeKB.value) * 1024 || 150 * 1024;
                const crop = cropMode.value;
                const format = outputFormat.value;
                const filter = filterMode.value;
                const upscale = upscaleMode.value;

                let cropW = img.width, cropH = img.height;
                const ratio = getAspectRatio(crop);
                if (ratio !== null) {
                    if (img.width / img.height > ratio) {
                        cropW = img.height * ratio;
                    } else {
                        cropH = img.width / ratio;
                    }
                }
                const offsetX = (img.width - cropW) / 2;
                const offsetY = (img.height - cropH) / 2;

                let finalDim = targetDim;
                if (upscale === 'simple' || upscale === 'enhanced') {
                    finalDim = targetDim * 2;
                }

                const canvas = document.createElement('canvas');
                canvas.width = finalDim;
                canvas.height = finalDim;
                const ctx = canvas.getContext('2d');
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';

                ctx.drawImage(img, offsetX, offsetY, cropW, cropH, 0, 0, finalDim, finalDim);

                if (filter === 'sharpen') {
                    applySharpen(ctx, finalDim, finalDim);
                } else if (filter !== 'none') {
                    const imageData = ctx.getImageData(0, 0, finalDim, finalDim);
                    applyFilter(ctx, finalDim, finalDim, filter, imageData);
                }

                if (upscale === 'enhanced') {
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = targetDim;
                    tempCanvas.height = targetDim;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.imageSmoothingEnabled = true;
                    tempCtx.imageSmoothingQuality = 'high';
                    tempCtx.drawImage(canvas, 0, 0, finalDim, finalDim, 0, 0, targetDim, targetDim);
                    ctx.clearRect(0, 0, finalDim, finalDim);
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(tempCanvas, 0, 0, targetDim, targetDim, 0, 0, finalDim, finalDim);
                }

                let quality = 0.92;
                let bestBlob = null;

                function tryExport(q) {
                    return new Promise((res) => {
                        if (format === 'image/png') {
                            canvas.toBlob((b) => res(b), 'image/png');
                        } else if (format === 'image/webp') {
                            canvas.toBlob((b) => res(b), 'image/webp', q);
                        } else {
                            canvas.toBlob((b) => res(b), 'image/jpeg', q);
                        }
                    });
                }

                (async function adjust() {
                    let currentQ = quality;
                    const maxAttempts = 15;
                    for (let i = 0; i < maxAttempts; i++) {
                        const blob = await tryExport(currentQ);
                        if (!blob) continue;
                        if (blob.size <= targetSize) {
                            bestBlob = blob;
                            break;
                        } else {
                            currentQ = Math.max(0.60, currentQ - 0.02);
                            if (currentQ < 0.60) break;
                        }
                    }
                    if (!bestBlob) bestBlob = await tryExport(0.70);
                    if (!bestBlob) bestBlob = await tryExport(0.80);

                    if (bestBlob) {
                        item.processedBlob = bestBlob;
                        item.processedDim = finalDim;
                        item.status = (upscale !== 'none') ? 'upscaled' : 'done';
                        
                        const reduction = ((item.file.size - bestBlob.size) / item.file.size * 100).toFixed(1);
                        updateStatusMessage(`✅ ${item.file.name} → ${formatBytes(bestBlob.size)} (کاهش ${reduction}%)`, 'success');
                    } else {
                        item.status = 'error';
                        updateStatusMessage(`❌ پردازش ${item.file.name} ناموفق بود`, 'error');
                    }
                    
                    updateProgress();
                    renderGallery();
                    updateStats();
                    resolve();
                })();
            });
        }

        async function processAll() {
            if (isProcessing) return;
            if (filesList.length === 0) {
                updateStatusMessage('⚠️ ابتدا حداقل یک عکس آپلود کنید.', 'error');
                return;
            }

            isProcessing = true;
            processAllBtn.disabled = true;
            updateProgress();

            const pendingItems = filesList.filter(f => f.status !== 'done' && f.status !== 'upscaled');
            updateStatusMessage(`⏳ در حال پردازش ${pendingItems.length} عکس...`);

            const batchSize = 3;
            for (let i = 0; i < pendingItems.length; i += batchSize) {
                const batch = pendingItems.slice(i, i + batchSize);
                await Promise.all(batch.map(item => processSingleItem(item)));
                updateProgress();
            }

            isProcessing = false;
            processAllBtn.disabled = false;
            const doneCount = filesList.filter(f => f.status === 'done' || f.status === 'upscaled').length;
            updateStatusMessage(`✅ ${doneCount} عکس با موفقیت پردازش شد.`, 'success');
            renderGallery();
        }

        // ===== UI Functions =====
        function updateProgress() {
            const total = filesList.length || 1;
            const done = filesList.filter(f => f.status === 'done' || f.status === 'upscaled').length;
            progressFill.style.width = (done / total * 100) + '%';
        }

        function renderGallery() {
            galleryGrid.innerHTML = '';
            filesList.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'image-card';

                let statusText = 'در انتظار';
                let statusClass = '';
                if (item.status === 'done') { statusText = '✅ پردازش‌شده'; statusClass = 'done'; }
                else if (item.status === 'upscaled') { statusText = '🔍 افزایش کیفیت'; statusClass = 'upscaled'; }
                else if (item.status === 'processing') { statusText = '⏳ در حال پردازش'; statusClass = 'processing'; }
                else if (item.status === 'error') { statusText = '❌ خطا'; statusClass = 'error'; }

                const src = item.originalData?.src || '';
                const name = item.file?.name || 'عکس';
                const size = item.file ? formatBytes(item.file.size) : '—';
                const outputSize = item.processedBlob ? formatBytes(item.processedBlob.size) : '—';
                const outputDim = item.processedDim ? `${item.processedDim}×${item.processedDim}` : '—';

                card.innerHTML = `
                    <div class="img-wrap">
                        <img src="${src}" alt="${name}" loading="lazy">
                    </div>
                    <div class="card-footer">
                        <span class="file-name" title="${name}">${name.length > 12 ? name.slice(0,10)+'…' : name}</span>
                        <span class="file-size">${size}</span>
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-top:4px; align-items:center; flex-wrap:wrap; gap:3px;">
                        <span class="status-badge ${statusClass}">${statusText}</span>
                        ${item.processedBlob ? `<span style="font-size:0.5rem; opacity:0.6; padding:1px 8px; border-radius:40px; border:1px solid var(--glass-border);">${outputSize}</span>` : ''}
                    </div>
                    <div class="btn-group">
                        ${item.processedBlob ? `<button class="btn-sm download" data-id="${item.id}">⬇️</button>` : ''}
                        ${item.originalData ? `<button class="btn-sm upscale-btn" data-id="${item.id}" ${item.status === 'processing' ? 'disabled' : ''}>🔍</button>` : ''}
                        <button class="btn-sm remove" data-id="${item.id}">✕</button>
                    </div>
                `;
                galleryGrid.appendChild(card);

                card.querySelector('.btn-sm.download')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    downloadSingle(parseInt(this.dataset.id));
                });

                card.querySelector('.btn-sm.upscale-btn')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = parseInt(this.dataset.id);
                    const item = filesList.find(f => f.id === id);
                    if (item) {
                        upscaleMode.value = 'simple';
                        processSingleItem(item);
                    }
                });

                card.querySelector('.btn-sm.remove')?.addEventListener('click', function(e) {
                    e.stopPropagation();
                    removeFile(parseInt(this.dataset.id));
                });
            });
            updateStats();
        }

        function updateStats() {
            totalCount.textContent = filesList.length;
            let totalBytes = filesList.reduce((sum, item) => sum + (item.file ? item.file.size : 0), 0);
            totalSize.textContent = formatBytes(totalBytes);
            const done = filesList.filter(f => f.status === 'done' || f.status === 'upscaled').length;
            processedCount.textContent = done;
            
            let totalBefore = 0, totalAfter = 0;
            filesList.forEach(f => {
                if (f.processedBlob) {
                    totalBefore += f.file.size;
                    totalAfter += f.processedBlob.size;
                }
            });
            reductionPercent.textContent = totalBefore > 0 ? ((1 - totalAfter/totalBefore) * 100).toFixed(1) + '%' : '۰%';
            
            processAllBtn.disabled = filesList.length === 0 || isProcessing;
            const hasDone = filesList.some(f => f.status === 'done' || f.status === 'upscaled');
            downloadAllBtn.disabled = !hasDone || isProcessing;
            updateProgress();
        }

        function removeFile(id) {
            const index = filesList.findIndex(f => f.id === id);
            if (index !== -1) {
                const item = filesList[index];
                if (item.originalData?.src) URL.revokeObjectURL(item.originalData.src);
                if (item.processedBlob) URL.revokeObjectURL(URL.createObjectURL(item.processedBlob));
                filesList.splice(index, 1);
                renderGallery();
                updateStatusMessage('🗑️ عکس حذف شد');
            }
        }

        function updateStatusMessage(msg, type = '') {
            statusMessage.textContent = msg;
            statusMessage.className = 'status-msg';
            if (type) statusMessage.classList.add(type);
        }

        function downloadSingle(id) {
            const item = filesList.find(f => f.id === id);
            if (!item || !item.processedBlob) return;

            let pattern = namePattern.value || 'image_{index}';
            const baseName = item.file.name.replace(/\.[^.]+$/, '') || 'image';
            const idx = filesList.indexOf(item) + 1;
            let finalName = pattern.replace(/{index}/g, idx).replace(/{name}/g, baseName);
            const ext = outputFormat.value.split('/')[1] || 'jpg';
            
            downloadWithLocation(item.processedBlob, `${finalName}.${ext}`);
        }

        function addFiles(files) {
            let added = 0;
            for (let f of files) {
                if (!f.type.startsWith('image/')) continue;
                if (f.size > 21 * 1024 * 1024) {
                    updateStatusMessage(`⚠️ ${f.name} بزرگتر از ۲۱ مگابایت است.`, 'error');
                    continue;
                }
                const exists = filesList.some(item => item.file.name === f.name && item.file.size === f.size);
                if (exists) continue;

                const id = ++idCounter;
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const item = {
                            id: id,
                            file: f,
                            originalData: { 
                                src: e.target.result, 
                                img: img, 
                                width: img.width, 
                                height: img.height 
                            },
                            processedBlob: null,
                            processedDim: null,
                            status: 'pending',
                            name: f.name,
                            size: f.size
                        };
                        filesList.push(item);
                        renderGallery();
                        updateStatusMessage(`✅ ${f.name} اضافه شد (${filesList.length} عکس)`, 'success');
                    };
                    img.onerror = function() {
                        updateStatusMessage(`❌ خطا در بارگذاری ${f.name}`, 'error');
                    };
                    img.src = e.target.result;
                };
                reader.onerror = function() {
                    updateStatusMessage(`❌ خطا در خواندن ${f.name}`, 'error');
                };
                reader.readAsDataURL(f);
                added++;
            }
            if (added === 0 && files.length > 0) {
                updateStatusMessage('⚠️ هیچ عکس معتبری اضافه نشد.', 'error');
            }
        }

        function downloadAllAsZip() {
            const doneItems = filesList.filter(f => (f.status === 'done' || f.status === 'upscaled') && f.processedBlob);
            if (doneItems.length === 0) {
                updateStatusMessage('⚠️ هیچ عکس پردازش‌شده‌ای وجود ندارد.', 'error');
                return;
            }

            if (typeof JSZip === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                script.onload = function() {
                    createAndDownloadZip(doneItems);
                };
                script.onerror = function() {
                    updateStatusMessage('❌ خطا در بارگذاری کتابخانه Zip.', 'error');
                };
                document.head.appendChild(script);
            } else {
                createAndDownloadZip(doneItems);
            }
        }

        function createAndDownloadZip(doneItems) {
            const zip = new JSZip();
            const ext = outputFormat.value.split('/')[1] || 'jpg';
            doneItems.forEach((item, idx) => {
                let pattern = namePattern.value || 'image_{index}';
                const baseName = item.file.name.replace(/\.[^.]+$/, '') || 'image';
                const finalName = pattern.replace(/{index}/g, idx+1).replace(/{name}/g, baseName);
                zip.file(`${finalName}.${ext}`, item.processedBlob);
            });

            zip.generateAsync({ type: 'blob' }).then(function(content) {
                downloadWithLocation(content, `optimized_images_${Date.now()}.zip`);
            });
        }

        window.saveSettings = function() {
            const settings = {
                targetSize: targetSizeKB.value,
                targetDim: targetDimension.value,
                crop: cropMode.value,
                format: outputFormat.value,
                filter: filterMode.value,
                upscale: upscaleMode.value,
                namePattern: namePattern.value
            };
            localStorage.setItem('imageForgeSettings', JSON.stringify(settings));
            updateStatusMessage('💾 تنظیمات ذخیره شد.', 'success');
        };

        window.loadSettings = function() {
            const data = localStorage.getItem('imageForgeSettings');
            if (!data) {
                updateStatusMessage('⚠️ تنظیمات ذخیره‌شده‌ای یافت نشد.', 'warning');
                return;
            }
            try {
                const s = JSON.parse(data);
                targetSizeKB.value = s.targetSize || 150;
                targetDimension.value = s.targetDim || 800;
                cropMode.value = s.crop || 'original';
                outputFormat.value = s.format || 'image/jpeg';
                filterMode.value = s.filter || 'none';
                upscaleMode.value = s.upscale || 'none';
                namePattern.value = s.namePattern || 'image_{index}';
                updateStatusMessage('📂 تنظیمات بارگذاری شد.', 'success');
            } catch(e) {
                updateStatusMessage('❌ خطا در بارگذاری تنظیمات.', 'error');
            }
        };

        // ===== Events =====
        fileInput.addEventListener('change', function(e) {
            if (this.files && this.files.length > 0) {
                addFiles(this.files);
            }
            this.value = '';
        });

        uploadArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = '#00d4ff';
        });

        uploadArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.style.borderColor = '';
        });

        uploadArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = '';
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                addFiles(e.dataTransfer.files);
            }
        });

        processAllBtn.addEventListener('click', processAll);
        downloadAllBtn.addEventListener('click', downloadAllAsZip);

        clearBtn.addEventListener('click', function() {
            if (filesList.length === 0) return;
            if (!confirm('آیا مطمئن هستید؟')) return;
            filesList.forEach(item => {
                if (item.originalData?.src) URL.revokeObjectURL(item.originalData.src);
                if (item.processedBlob) URL.revokeObjectURL(URL.createObjectURL(item.processedBlob));
            });
            filesList = [];
            renderGallery();
            updateStatusMessage('🗑️ همه عکس‌ها پاک شدند.');
        });

        // ===== Init =====
        loadSettings();
        renderGallery();
        updateStatusMessage('🚀 ImageForge 2026 آماده است!');
    })();
</script>

</body>
